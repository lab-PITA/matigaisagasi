<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パリの間違い探しゲーム (上下配置・ズーム版)</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
            cursor: default; /* デフォルトのカーソルに固定 */
        }
        #counter {
            position: fixed;
            top: 10px;
            right: 10px;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            z-index: 1000;
        }
        #game-container {
            display: flex;
            flex-direction: column; /* 上下に並べる */
            align-items: center;
            gap: 20px;
            padding: 80px 10px 20px 10px; /* カウンターを避けるためのpadding */
            position: relative;
        }
        .image-wrapper {
            position: relative;
            cursor: default; /* デフォルトのカーソルに固定 */
            width: 100%; /* 親要素いっぱい */
            max-width: 1200px; /* あまりに大きくなりすぎないように */
            transition: transform 0.3s ease; /* ズーム時のアニメーション */
            transform-origin: top left; /* 左上を起点に拡大 */
        }
        /* ズーム時のクラス */
        .image-wrapper.zoomed {
            transform: scale(2); /* 2倍に拡大 (お好みで調整してください) */
            z-index: 100;
        }
        img {
            display: block;
            width: 100%; /* wrapperいっぱい */
            height: auto;
            border: 2px solid #ccc;
        }
        /* 当たり判定エリア */
        .spot {
            position: absolute;
            background: rgba(255, 0, 0, 0); /* 透明 */
            cursor: default; /* デフォルトのカーソルに固定 */
            z-index: 10;
        }
        /* 小さな丸 */
        .marker {
            position: absolute;
            width: 3%; /* 画像の幅に対する割合 */
            height: 3%; /* 画像の幅に対する割合 */
            border: 4px solid red;
            border-radius: 50%;
            display: none;
            z-index: 20;
            pointer-events: none; /* 下の要素にイベントを通す */
            transform: translate(-50%, -50%); /* 中心を合わせる */
        }
        
    </style>
</head>
<body>

    <div id="counter">見つけた間違い: 0 / 10</div>

    <div id="game-container">
        <h1>パリの間違い探し</h1>
        <p>2つの画像には10個の間違いがあります。上下に並んだ「間違い画像」で間違いを見つけてクリックしてください。<br>
        間違いを見つけると、赤い丸が表示されます。<br>
        (ヒント: 画像をクリックすると拡大/縮小できます)</p>

        <div class="image-wrapper" id="original-wrapper">
            <h2>元の画像 (image_6.png)</h2>
            <img id="original-img" src="image_6.png" alt="元の画像 (image_6.png)">
        </div>

        <div class="image-wrapper" id="test-wrapper">
            <h2>テスト画像 (10個の間違いあり - image_5.png)</h2>
            <img id="test-img" src="image_5.png" alt="間違いを含む画像 (image_5.png)">

            <div class="spot" id="spot1" style="left: 0%; top: 60%; width: 15%; height: 10%;"></div>
            <div class="marker" id="marker1" style="left: 7%; top: 63%;"></div>

            <div class="spot" id="spot2" style="left: 0%; top: 70%; width: 15%; height: 5%;"></div>
            <div class="marker" id="marker2" style="left: 8%; top: 72%;"></div>

            <div class="spot" id="spot3" style="left: 27%; top: 2%; width: 10%; height: 10%;"></div>
            <div class="marker" id="marker3" style="left: 32%; top: 7%;"></div>

            <div class="spot" id="spot4" style="left: 56%; top: 38%; width: 4%; height: 18%;"></div>
            <div class="marker" id="marker4" style="left: 58%; top: 43%;"></div>

            <div class="spot" id="spot5" style="left: 67%; top: 2%; width: 10%; height: 10%;"></div>
            <div class="marker" id="marker5" style="left: 72%; top: 7%;"></div>

            <div class="spot" id="spot6" style="left: 88%; top: 60%; width: 12%; height: 12%;"></div>
            <div class="marker" id="marker6" style="left: 92%; top: 63%;"></div>

            <div class="spot" id="spot7" style="left: 0%; top: 0%; width: 10%; height: 10%;"></div>
            <div class="marker" id="marker7" style="left: 5%; top: 5%;"></div>

            <div class="spot" id="spot8" style="left: 27%; top: 80%; width: 18%; height: 15%;"></div>
            <div class="marker" id="marker8" style="left: 36%; top: 85%;"></div>

            <div class="spot" id="spot9" style="left: 84%; top: 80%; width: 10%; height: 15%;"></div>
            <div class="marker" id="marker9" style="left: 89%; top: 85%;"></div>

            <div class="spot" id="spot10" style="left: 14%; top: 76%; width: 13%; height: 18%;"></div>
            <div class="marker" id="marker10" style="left: 20%; top: 82%;"></div>

        </div>
    </div>

    <script>
        const testWrapper = document.getElementById('test-wrapper');
        const originalWrapper = document.getElementById('original-wrapper');
        const counter = document.getElementById('counter');
        const found = [false, false, false, false, false, false, false, false, false, false];
        let foundCount = 0;

        // すべてのスポットにイベントリスナーを追加
        for (let i = 1; i <= 10; i++) {
            const spot = document.getElementById(`spot${i}`);
            const marker = document.getElementById(`marker${i}`);

            spot.addEventListener('click', (event) => {
                // すでにズームされている場合は、間違い発見処理を行わない (ズーム解除のため)
                if (testWrapper.classList.contains('zoomed')) {
                    return;
                }

                if (!found[i - 1]) {
                    found[i - 1] = true;
                    marker.style.display = 'block';
                    foundCount++;
                    counter.innerText = `見つけた間違い: ${foundCount} / 10`;

                    if (foundCount === 10) {
                        counter.innerText = 'おめでとうございます！すべての間違いを見つけました。';
                        counter.style.color = 'green';
                    }
                }
                event.stopPropagation(); // wrapperへのクリック（ズーム）を止める
            });
        }

        // ズーム機能の追加
        function toggleZoom(wrapper, event) {
            wrapper.classList.toggle('zoomed');
            event.stopPropagation(); // wrapperへのクリックを止める
        }

        testWrapper.addEventListener('click', (event) => toggleZoom(testWrapper, event));
        originalWrapper.addEventListener('click', (event) => toggleZoom(originalWrapper, event));

        // マウスカーソル対策
        testWrapper.style.cursor = 'default';
        originalWrapper.style.cursor = 'default';
        const spots = document.querySelectorAll('.spot');
        spots.forEach(spot => {
            spot.style.cursor = 'default';
        });

    </script>
</body>
</html>
