<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パリの間違い探しゲーム</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            background-color: #f0f0f0;
            cursor: default; /* デフォルトのカーソルに固定 */
        }
        #game-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            position: relative;
        }
        .image-wrapper {
            position: relative;
            cursor: default; /* デフォルトのカーソルに固定 */
        }
        img {
            display: block;
            border: 2px solid #ccc;
        }
        /* 当たり判定エリア */
        .spot {
            position: absolute;
            background: rgba(255, 0, 0, 0); /* 透明 */
            cursor: default; /* デフォルトのカーソルに固定 */
            z-index: 10;
        }
        /* 小さな丸 */
        .marker {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 4px solid red;
            border-radius: 50%;
            display: none;
            z-index: 20;
            pointer-events: none; /* 下の要素にイベントを通す */
        }
    </style>
</head>
<body>

    <h1>パリの間違い探し</h1>
    <p>2つの画像には10個の間違いがあります。右側の画像で間違いを見つけてクリックしてください。<br>
    間違いを見つけると、赤い丸が表示されます。<br>
    (ヒント: 拡大して見る必要があるかもしれません)</p>

    <div id="game-container">
        <div class="image-wrapper" id="original-wrapper">
            <h2>元の画像</h2>
            <img id="original-img" src="image_6.png" alt="元の画像 (image_2.png)">
        </div>

        <div class="image-wrapper" id="test-wrapper">
            <h2>テスト画像 (10個の間違いあり)</h2>
            <img id="test-img" src="image_5.png" alt="間違いを含む画像 (image_3.png)">

            <div class="spot" id="spot1" style="left: 0px; top: 600px; width: 150px; height: 100px;"></div>
            <div class="marker" id="marker1" style="left: 70px; top: 630px;"></div>

            <div class="spot" id="spot2" style="left: 0px; top: 700px; width: 150px; height: 50px;"></div>
            <div class="marker" id="marker2" style="left: 80px; top: 700px;"></div>

            <div class="spot" id="spot3" style="left: 270px; top: 20px; width: 100px; height: 100px;"></div>
            <div class="marker" id="marker3" style="left: 310px; top: 70px;"></div>

            <div class="spot" id="spot4" style="left: 560px; top: 380px; width: 40px; height: 180px;"></div>
            <div class="marker" id="marker4" style="left: 565px; top: 430px;"></div>

            <div class="spot" id="spot5" style="left: 670px; top: 20px; width: 100px; height: 100px;"></div>
            <div class="marker" id="marker5" style="left: 710px; top: 70px;"></div>

            <div class="spot" id="spot6" style="left: 880px; top: 600px; width: 120px; height: 120px;"></div>
            <div class="marker" id="marker6" style="left: 920px; top: 630px;"></div>

            <div class="spot" id="spot7" style="left: 0px; top: 0px; width: 100px; height: 100px;"></div>
            <div class="marker" id="marker7" style="left: 30px; top: 30px;"></div>

            <div class="spot" id="spot8" style="left: 270px; top: 800px; width: 180px; height: 150px;"></div>
            <div class="marker" id="marker8" style="left: 350px; top: 850px;"></div>

            <div class="spot" id="spot9" style="left: 840px; top: 800px; width: 100px; height: 150px;"></div>
            <div class="marker" id="marker9" style="left: 870px; top: 850px;"></div>

            <div class="spot" id="spot10" style="left: 140px; top: 760px; width: 130px; height: 180px;"></div>
            <div class="marker" id="marker10" style="left: 190px; top: 820px;"></div>

        </div>
    </div>

    <div id="counter">見つけた間違い: 0 / 10</div>

    <script>
        const testWrapper = document.getElementById('test-wrapper');
        const counter = document.getElementById('counter');
        const found = [false, false, false, false, false, false, false, false, false, false];
        let foundCount = 0;

        // すべてのスポットにイベントリスナーを追加
        for (let i = 1; i <= 10; i++) {
            const spot = document.getElementById(`spot${i}`);
            const marker = document.getElementById(`marker${i}`);

            spot.addEventListener('click', (event) => {
                if (!found[i - 1]) {
                    found[i - 1] = true;
                    marker.style.display = 'block';
                    foundCount++;
                    counter.innerText = `見つけた間違い: ${foundCount} / 10`;

                    if (foundCount === 10) {
                        counter.innerText = 'おめでとうございます！すべての間違いを見つけました。';
                        counter.style.color = 'green';
                    }
                }
                event.stopPropagation(); // wrapperへのクリックを止める
            });
        }

        // 外れた場合の処理（任意）
        testWrapper.addEventListener('click', () => {
            console.log('外れ');
        });

        // マウスカーソル対策
        // スポット上でも wrapper上でもカーソルを default に固定する
        testWrapper.style.cursor = 'default';
        const spots = document.querySelectorAll('.spot');
        spots.forEach(spot => {
            spot.style.cursor = 'default';
        });

    </script>
</body>
</html>
